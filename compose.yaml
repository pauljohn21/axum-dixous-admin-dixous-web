# ============================================================
# Docker Compose for axum-dixous-admin 前端 (Nginx)
# ============================================================
# 前置条件:
#   先执行 dx build --release 构建前端产物
#
# 常用命令:
#   dx build --release              # 构建前端 WASM 产物
#   docker compose up -d            # 后台启动 Nginx
#   docker compose down             # 停止并移除容器
#   docker compose logs -f nginx    # 查看日志
#
# 访问地址:
#   前端:  http://localhost:80
#   API:   http://localhost:80/api/*  (代理到后端 :8888)
# ============================================================

name: axum-admin-web

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    container_name: admin-web
    ports:
      - "80:80"
    volumes:
      # 挂载构建产物 (dx build --release 输出)
      - ./target/dx/web/release/web/public:/usr/share/nginx/html:ro
      # 挂载 nginx 配置
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      # Linux 兼容: 将 host.docker.internal 映射到宿主机网关
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - web-net

networks:
  web-net:
    driver: bridge
