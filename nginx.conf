# ============================================================
# Nginx 配置 — axum-dixous-admin 前端
# ============================================================
# 功能:
#   1. 静态文件服务 (WASM + JS + HTML)
#   2. /api 反向代理到后端 Axum 服务
#   3. gzip 压缩 (JS/WASM/HTML)
#   4. 带哈希的资源文件长期缓存
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 日志
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ==================== gzip 压缩 ====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/xml
        image/svg+xml;

    # ==================== 后端上游 (Axum :8888) ====================
    upstream backend {
        server host.docker.internal:8888;
    }

    server {
        listen 80;
        server_name _;
        charset utf-8;

        root /usr/share/nginx/html;
        index index.html;

        # ---------- API 反向代理 ----------
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ---------- 健康检查 ----------
        location /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok"}';
        }

        # ---------- WASM 文件 (MIME + 长期缓存) ----------
        # Dioxus 产物: web_bg-dx<hash>.wasm
        location ~* \-dx[a-z0-9]+\.wasm$ {
            types { application/wasm wasm; }
            default_type application/wasm;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ---------- JS / ICO 带哈希资源 (长期缓存) ----------
        # Dioxus 产物: web-dx<hash>.js, favicon-dx<hash>.ico
        location ~* \-dx[a-z0-9]+\.(js|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ---------- SPA 前端路由回退 ----------
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
